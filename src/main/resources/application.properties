spring.application.name=FinOS
# Database Configuration
# Uses a local file database by default so the app works immediately.
# Override these DATABASE_* values to connect to PostgreSQL.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/finos-v2;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Local database console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:finos-dev-secret-please-change-in-production-must-be-at-least-64-chars-long!}
jwt.expiration=86400000
# 86400000 ms = 24 hours

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.deepLinking=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.swagger-ui.disable-swagger-default-url=true

# Application Info (used in Swagger docs)
spring.application.description=Personal Finance Management and Analysis Application
spring.application.version=1.0
